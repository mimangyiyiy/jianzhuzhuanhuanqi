<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d2b;min-height:100vh;font-family:"Segoe UI","Microsoft YaHei",sans-serif;padding:20px;color:#ccc}
.container{max-width:960px;margin:0 auto}
.wm{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:999;opacity:.06}
.header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px}
.header h1{font-size:24px;color:#fff}
.header h1 span{background:linear-gradient(135deg,#7c4dff,#448aff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:13px;color:#889}.header .badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;background:rgba(124,77,255,.2);color:#b197fc;margin-left:6px}
#status{background:rgba(255,255,255,.03);border-left:3px solid #7c4dff;border-radius:6px;padding:10px 16px;margin-bottom:10px;font-size:13px}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px;margin-bottom:10px}
.drop-zone{border:2px dashed rgba(255,255,255,.1);border-radius:8px;padding:24px 20px;text-align:center;cursor:pointer;transition:.3s}
.drop-zone:hover{border-color:rgba(124,77,255,.4);background:rgba(124,77,255,.05)}
.drop-zone.drag-over{border-color:#7c4dff;background:rgba(124,77,255,.12)}
.drop-zone.has-file{border-color:#ffd43b;background:rgba(255,212,59,.06)}
.drop-zone .file-name{color:#ffd43b;font-weight:500;margin-top:4px;font-size:14px}
.drop-zone .file-size{font-size:11px;color:#666}
.drop-zone input[type=file]{display:none}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px}
.row label{font-size:12px;color:#999}
.row input[type=text],.row input[type=number]{padding:4px 8px;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:rgba(0,0,0,.3);color:#ccc;font-size:12px;width:60px}
.row select{padding:4px 6px;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:rgba(0,0,0,.3);color:#ccc;font-size:12px}
.btn{padding:8px 20px;border:none;border-radius:6px;font-size:13px;cursor:pointer;color:#fff;display:inline-flex;align-items:center;gap:6px;transition:.15s;font-weight:500}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#7c4dff,#5e35e0)}
.btn-primary:hover:not(:disabled){opacity:.85;transform:scale(1.02)}
.btn-success{background:linear-gradient(135deg,#00c853,#00a844)}
.btn-success:hover:not(:disabled){opacity:.85;transform:scale(1.02)}
.btn-preview{background:linear-gradient(135deg,#00b894,#00a381)}
.btn-preview:hover:not(:disabled){opacity:.85;transform:scale(1.02)}
.btn-share{background:linear-gradient(135deg,#ff8c00,#ff6a00)}
.btn-share:hover:not(:disabled){opacity:.85;transform:scale(1.02)}
.btn-danger{background:linear-gradient(135deg,#ff1744,#d50000)}
.btn-danger:hover:not(:disabled){opacity:.85;transform:scale(1.02)}
.btn-sm{padding:4px 12px;font-size:12px}
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.06);margin-top:6px}
.tab{padding:6px 16px;cursor:pointer;font-size:12px;color:#666;border-bottom:2px solid transparent;transition:.2s;display:flex;align-items:center;gap:4px}
.tab:hover{color:#aaa}.tab.active{color:#ccc;border-bottom-color:#7c4dff}
.tab-content{display:none;margin-top:6px}.tab-content.active{display:block}
.box{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:10px;font-family:Consolas,monospace;font-size:12px;color:#8b8baa;height:260px;overflow:auto;white-space:pre-wrap;word-break:break-all}
.box-lg{height:380px}.box-sm{height:150px}
.box-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.box-header span{font-size:11px;color:#666}
.copy-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#aaa;padding:2px 12px;border-radius:4px;font-size:11px;cursor:pointer}
.copy-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.sens-area{width:100%;height:160px;font-family:Consolas,monospace;font-size:12px;margin-top:8px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:8px;color:#ccc;resize:vertical}
.sens-area:focus{outline:none;border-color:#7c4dff}
#loadingOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(13,13,43,.92);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loadingOverlay.active{display:flex}
#loadingOverlay .spinner{width:40px;height:40px;border:3px solid rgba(124,77,255,.2);border-top-color:#7c4dff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loadingOverlay .loading-text{color:#889;font-size:13px}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 28px;border-radius:10px;font-size:14px;font-weight:500;z-index:10000;opacity:0;transition:all .4s;pointer-events:none;background:rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.1)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{border-color:#00c853;color:#69db7c}
#toast.error{border-color:#ff1744;color:#ff6b6b}
#toast.info{border-color:#448aff;color:#74c0fc}
@media(max-width:600px){.row{gap:4px}.btn{padding:6px 12px;font-size:11px}.header h1{font-size:18px}.box{height:180px}.box-lg{height:280px}}
</style></head><body>

<div class="container">
<div class="header">
<h1>MC <span>建筑转换器</span> v4.8</h1>
<div class="sub">Pyodide (浏览器端) | 小逸罒不迷茫 <span class="badge">纯前端</span></div>
</div>

<div class="card">
<div class="drop-zone" id="dropZone">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
<div><span id="dropText">点击选择 或 拖拽 .schematic / .litematic</span></div>
<div id="fileInfo" style="display:none;margin-top:4px">

<div class="file-size" id="fileSizeDisplay"></div>

<input type="file" id="fileInput" accept=".schematic,.litematic">
</div>

<div class="row">

<label>速度:</label><input type="text" id="speed" value="1" style="width:40px">

<span id="bTagGroup"><label>扫描盔甲架:</label><input type="text" id="bTag" value="b" style="width:40px"></span>
<label>指令上限:</label><input type="text" id="maxChars" value="10000" style="width:60px">
</div>

<div class="row" style="margin-top:8px">
<button class="btn btn-primary" onclick="convert()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 转换</button>
<button class="btn btn-preview" id="previewBtn" onclick="preview()" disabled><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> 预览</button>
<button class="btn btn-danger btn-sm" onclick="clearAll()" style="margin-left:auto"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg> 清空</button>

</div>
<div id="dlArea" style="display:none;margin-top:8px">
<a class="btn btn-success btn-sm" id="dlLink" style="text-decoration:none"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 下载指令文件</a>
<button class="btn btn-share btn-sm" onclick="shareToKV()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> 生成分享链接</button>
</div>
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('log')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg> 日志</div>
<div class="tab" onclick="switchTab('cmd')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg> 指令</div>

<script>
var lg=document.getElementById('log'),fi=document.getElementById('fileInput');

function log(m){lg.textContent+=m+'\n';lg.scrollTop=lg.scrollHeight}
function st(t){document.getElementById('status').textContent=t}
function sw(n){document.querySelectorAll('.tab,.tab-content').forEach(function(e){e.classList.remove('active')});document.getElementById(n+'Content').classList.add('active');document.querySelector('.tab[onclick*="'+n+'"]').classList.add('active')}
function sl(t){document.querySelector('#loadingOverlay .loading-text').textContent=t||'处理中...';document.getElementById('loadingOverlay').classList.add('active')}
function hl(){document.getElementById('loadingOverlay').classList.remove('active')}
function fs(s){if(s<1024)return s+'B';if(s<1048576)return(s/1024).toFixed(1)+'KB';return(s/1048576).toFixed(1)+'MB'}
function sn(n){return n.replace(/[^a-zA-Z0-9.\-_]/g,'_')}
function switchTab(n){sw(n)}
function toggleNameInput(){tni()}
function clearAll(){ca()}
function copyCommands(){cc()}
function saveSensitive(){ss()}
function loadSensitive(){ls()}

function hf(f){
if(!f)return;var x=f.name.split('.').pop().toLowerCase();
if(x!=='schematic'&&x!=='litematic'){log('不支持: '+x);return}
document.getElementById('dropZone').classList.add('has-file');
document.getElementById('fileInfo').style.display='block';
document.getElementById('fileNameDisplay').textContent=f.name;
document.getElementById('fileSizeDisplay').textContent=fs(f.size);
document.getElementById('dropText').textContent='文件已选择，点击更换';
document.getElementById('previewBtn').disabled=false;log('加载: '+f.name);
}
fi.addEventListener('change',function(){if(this.files.length>0)hf(this.files[0])});
document.getElementById('dropZone').addEventListener('click',function(){fi.click()});
document.getElementById('dropZone').addEventListener('dragover',function(e){e.preventDefault();this.classList.add('drag-over')});
document.getElementById('dropZone').addEventListener('dragleave',function(){this.classList.remove('drag-over')});
document.getElementById('dropZone').addEventListener('drop',function(e){e.preventDefault();this.classList.remove('drag-over');if(e.dataTransfer.files.length>0){fi.files=e.dataTransfer.files;hf(e.dataTransfer.files[0])}});

function tni(){
var m=document.getElementById('modeSelect').value,s=m==='single';
document.getElementById('nameLabel').style.display=s?'':'none';
document.getElementById('armorstandName').style.display=s?'':'none';
document.getElementById('hTagGroup').style.display=s?'none':'';
document.getElementById('bTagGroup').style.display=s?'none':'';
}
function ca(){
fi.value='';document.getElementById('dropZone').classList.remove('has-file');
document.getElementById('fileInfo').style.display='none';
document.getElementById('dropText').textContent='点击选择 或 拖拽 .schematic / .litematic';
document.getElementById('previewBtn').disabled=true;
document.getElementById('dlArea').style.display='none';
document.getElementById('cmdLog').textContent='等待转换...';
document.getElementById('cmdCount').textContent='0';
document.getElementById('infoText').textContent='';log('已清空');
}
function cc(){
var t=document.getElementById('cmdLog').textContent;
if(!t||t==='等待转换...')return;
navigator.clipboard.writeText(t).then(function(){stt('已复制','success')}).catch(function(){
var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();stt('已复制','success')});
}
function stt(m,t){
var e=document.getElementById('toast');e.textContent=m;e.className='toast '+(t||'info')+' show';
clearTimeout(window._tt);window._tt=setTimeout(function(){e.classList.remove('show')},3000);
}
function ls(){document.getElementById('sensArea').value=localStorage.getItem('mc_sens')||'';document.getElementById('rmMsg').textContent='已加载'}
function ss(){localStorage.setItem('mc_sens',document.getElementById('sensArea').value);document.getElementById('rmMsg').textContent='已保存'}

var BLOCK_COLORS={
'stone':'#888','cobblestone':'#777','dirt':'#8B5E3C','grass_block_top':'#5B8C3E',
'oak_planks':'#C4914A','spruce_planks':'#6B4226','birch_planks':'#D4C48A','jungle_planks':'#9C6B3E',

'white_wool':'#EEE','orange_wool':'#E87D2A','magenta_wool':'#B44AB4','light_blue_wool':'#6AA8D4',
'yellow_wool':'#E8D42A','lime_wool':'#6AD42A','pink_wool':'#E86AA8','gray_wool':'#888',
'cyan_wool':'#2A8A8A','purple_wool':'#6A2AB4','blue_wool':'#2A4AD4','brown_wool':'#5A3A1A',
'green_wool':'#2A6A1A','red_wool':'#D42A2A','black_wool':'#222','glass':'#88CCEE',
'obsidian':'#1A1A2A','gold_block':'#F0D060','iron_block':'#CCC','diamond_block':'#4AD4D4',
'emerald_block':'#4AD44A','redstone_block':'#D42A2A','lapis_block':'#2A4AD4',
'water_still':'#2A4AD4','snow':'#EEE','netherrack':'#6A2A2A','glowstone':'#D4D46A',
'bookshelf':'#8B6B3A','quartz_block_side':'#DDD','end_stone':'#D4D48A',
};

function getBlockColor(texName){
var key=texName.replace('.png','');
if(BLOCK_COLORS[key])return BLOCK_COLORS[key];
for(var suf of ['_top','_side','_bottom','_front','_sides','_end']){
if(key.endsWith(suf)){var base=key.slice(0,-suf.length);if(BLOCK_COLORS[base])return BLOCK_COLORS[base]}
}
var h=0;for(var i=0;i<key.length;i++)h=((h<<5)-h)+key.charCodeAt(i);
var hue=((h%360)+360)%360;return 'hsl('+hue+',30%,55%)';
}

function renderPreview3D(container,blockData,width,height,length){
import('three').then(function(THREE){
import('three/addons/controls/OrbitControls.js').then(function(OC){
var scene=new THREE.Scene();scene.background=new THREE.Color(0x1a1a3e);
var maxDim=Math.max(width,height,length);
var camDist=maxDim*1.8+5;
var camera=new THREE.PerspectiveCamera(40,container.clientWidth/container.clientHeight,0.1,5000);
camera.position.set(camDist*0.6,camDist*0.5,camDist*0.8);
camera.lookAt(width/2,height/2,length/2);
var renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(container.clientWidth,container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);
var controls=new OC.OrbitControls(camera,renderer.domElement);
controls.target.set(width/2,height/2,length/2);
controls.enableDamping=true;controls.dampingFactor=0.12;controls.update();
var ambient=new THREE.AmbientLight(0x404060,0.6);scene.add(ambient);
var dirLight=new THREE.DirectionalLight(0xffeedd,1.2);
dirLight.position.set(maxDim*0.5,maxDim*1.5,maxDim*0.8);dirLight.castShadow=true;scene.add(dirLight);
var fillLight=new THREE.DirectionalLight(0x8888ff,0.4);
fillLight.position.set(-maxDim*0.3,maxDim*0.3,-maxDim*0.5);scene.add(fillLight);
var grid=new THREE.GridHelper(Math.max(width,length)*1.5,20,0x7c4dff,0x444466);
grid.position.set(width/2,-0.5,length/2);scene.add(grid);
var texGroups={};
for(var i=0;i<blockData.length;i++){var b=blockData[i];if(!texGroups[b.t])texGroups[b.t]=[];texGroups[b.t].push(b)}
var texNames=Object.keys(texGroups);
var texDir='4.8/block/';
var loader=new THREE.TextureLoader();
var loadedCount=0,totalToLoad=texNames.length;
function onTexReady(tn,texture){
var blocks=texGroups[tn];var geo=new THREE.BoxGeometry(1,1,1);
var mat=new THREE.MeshLambertMaterial({map:texture,color:0xffffff});
var mesh=new THREE.InstancedMesh(geo,mat,blocks.length);
var dummy=new THREE.Object3D();
for(var i=0;i<blocks.length;i++){dummy.position.set(blocks[i].x+0.5,blocks[i].y+0.5,blocks[i].z+0.5);dummy.updateMatrix();mesh.setMatrixAt(i,dummy.matrix)}
mesh.instanceMatrix.needsUpdate=true;mesh.castShadow=true;mesh.receiveShadow=true;
scene.add(mesh);loadedCount++;
if(loadedCount>=totalToLoad){log('3D 预览渲染完成');st('预览完成 ('+blockData.length+' 方块)')}
}
for(var t=0;t<texNames.length;t++){
(function(tn){
loader.load(texDir+tn,
function(texture){texture.magFilter=THREE.NearestFilter;texture.minFilter=THREE.NearestFilter;onTexReady(tn,texture)},
undefined,function(){
var color=getBlockColor(tn);var blocks=texGroups[tn];
var geo=new THREE.BoxGeometry(1,1,1);var mat=new THREE.MeshLambertMaterial({color:new THREE.Color(color)});
var mesh=new THREE.InstancedMesh(geo,mat,blocks.length);var dummy=new THREE.Object3D();
for(var i=0;i<blocks.length;i++){dummy.position.set(blocks[i].x+0.5,blocks[i].y+0.5,blocks[i].z+0.5);dummy.updateMatrix();mesh.setMatrixAt(i,dummy.matrix)}
mesh.instanceMatrix.needsUpdate=true;mesh.castShadow=true;mesh.receiveShadow=true;scene.add(mesh);loadedCount++;
if(loadedCount>=totalToLoad){log('3D 预览渲染完成（部分纹理未加载）');st('预览完成')}
})
})(texNames[t]);
}
function animate(){viewerAnimationId=requestAnimationFrame(animate);controls.update();renderer.render(scene,camera)}
animate();
function onResize(){if(!container.isConnected)return;var w=container.clientWidth,h=container.clientHeight;if(w===0||h===0)return;camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h)}
window.addEventListener('resize',onResize);
viewerScene=scene;viewerCamera=camera;viewerRenderer=renderer;viewerControls=controls;
}).catch(function(e){log('加载 OrbitControls 失败: '+e.message)});
}).catch(function(e){log('加载 Three.js 失败: '+e.message)});
}
